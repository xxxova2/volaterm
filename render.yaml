# One-click full terminal on Render (same stack as localhost: UI + APIs + rates).
# Dashboard: https://dashboard.render.com → New → Blueprint → this repo
services:
  - type: web
    name: volaterm
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MACROVOL_API_URL
        value: http://127.0.0.1:8765
      - key: ALLOW_STIR_FALLBACK
        value: "0"
      # Add these in the Render dashboard after create (Secrets):
      - key: FMP_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
