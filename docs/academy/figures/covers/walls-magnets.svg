  <path d="M 220 620 Q 400 500 600 540 Q 800 580 980 450" fill="none" stroke="#6a8fa8" stroke-width="4"/>
  <text x="200" y="360" text-anchor="middle" fill="#5a9a72" font-size="18">put wall</text>
  <text x="600" y="360" text-anchor="middle" fill="#c4a574" font-size="18">HVL</text>
