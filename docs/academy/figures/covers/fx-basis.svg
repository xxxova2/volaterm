<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="FX and XCCY basis">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0f14"/>
      <stop offset="100%" stop-color="#151b24"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#c4a574" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c4a574" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#g)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect x="0" y="0" width="8" height="800" fill="#c4a574"/>

  <text x="48" y="72" fill="#9a9284" font-family="ui-sans-serif" font-size="22" letter-spacing="4">MACRO · FX</text>
  <text x="48" y="150" fill="#f3efe6" font-family="Georgia,serif" font-size="44" font-weight="700">FX and the</text>
  <text x="48" y="210" fill="#f3efe6" font-family="Georgia,serif" font-size="44" font-weight="700">cross-currency basis</text>
  <text x="48" y="270" fill="#9a9284" font-size="24">Dollar demand shows up as a basis, not a headline</text>
  <g transform="translate(200,360)">
    <rect x="0" y="40" width="280" height="200" rx="12" fill="#141a22" stroke="#2a3340" stroke-width="2"/>
    <text x="140" y="130" text-anchor="middle" fill="#f3efe6" font-size="28">EUR</text>
    <text x="140" y="180" text-anchor="middle" fill="#9a9284" font-size="18">local funding</text>
    <path d="M 300 140 L 480 140" stroke="#c4a574" stroke-width="4" marker-end="url(#m)"/>
    <text x="390" y="120" text-anchor="middle" fill="#c4a574" font-size="18">swap</text>
    <rect x="500" y="40" width="280" height="200" rx="12" fill="#141a22" stroke="#6a8fa8" stroke-width="3"/>
    <text x="640" y="130" text-anchor="middle" fill="#f3efe6" font-size="28">USD</text>
    <text x="640" y="180" text-anchor="middle" fill="#9a9284" font-size="18">dollar liquidity</text>
  </g>

