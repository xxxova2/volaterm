<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Black-Scholes intuition">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0f14"/>
      <stop offset="100%" stop-color="#151b24"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#c4a574" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c4a574" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#g)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect x="0" y="0" width="8" height="800" fill="#c4a574"/>

  <text x="48" y="72" fill="#9a9284" font-family="ui-sans-serif" font-size="22" letter-spacing="4">OPTIONS</text>
  <text x="48" y="150" fill="#f3efe6" font-family="Georgia,serif" font-size="44" font-weight="700">Black–Scholes intuition</text>
  <text x="48" y="210" fill="#9a9284" font-size="26">No hazing. One machine: hedge, rebalance, residual.</text>
  <rect x="80" y="300" width="1000" height="360" rx="16" fill="#141a22" stroke="#2a3340" stroke-width="2"/>
  <text x="580" y="380" text-anchor="middle" fill="#c4a574" font-family="Georgia,serif" font-size="36">C = S N(d₁) − K e⁻ʳᵀ N(d₂)</text>
  <text x="200" y="480" fill="#9a9284" font-size="22">Spot × probability weight</text>
  <text x="720" y="480" fill="#9a9284" font-size="22">Strike discounted × risk-neutral</text>
  <text x="580" y="580" text-anchor="middle" fill="#f3efe6" font-size="22">The formula is a story about dynamic hedging — not a crystal ball.</text>

</svg>
