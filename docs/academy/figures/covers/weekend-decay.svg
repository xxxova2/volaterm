    <text x="60" y="90" text-anchor="middle" fill="#5a9a72" font-family="ui-sans-serif" font-size="28" font-weight="700">F</text>
    <text x="200" y="90" text-anchor="middle" fill="#9a9284" font-family="ui-sans-serif" font-size="28">S</text>
    <text x="340" y="90" text-anchor="middle" fill="#9a9284" font-family="ui-sans-serif" font-size="28">S</text>
    <text x="480" y="90" text-anchor="middle" fill="#c4a574" font-family="ui-sans-serif" font-size="28" font-weight="700">M</text>
    <text x="620" y="90" text-anchor="middle" fill="#f3efe6" font-family="ui-sans-serif" font-size="28">T</text>
