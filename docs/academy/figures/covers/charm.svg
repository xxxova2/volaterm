<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Charm dealer path bias">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0f14"/>
      <stop offset="100%" stop-color="#151b24"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#c4a574" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c4a574" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#g)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect x="0" y="0" width="8" height="800" fill="#c4a574"/>

  <text x="48" y="72" fill="#9a9284" font-family="ui-sans-serif" font-size="22" letter-spacing="4">POSITIONING</text>
  <text x="48" y="150" fill="#f3efe6" font-family="Georgia,serif" font-size="52" font-weight="700">Charm</text>
  <text x="48" y="220" fill="#f3efe6" font-family="Georgia,serif" font-size="36" font-weight="700">when time moves the hedge</text>
  <text x="48" y="280" fill="#9a9284" font-size="24">Δ decays into expiry · dealers rebalance without a tape move</text>
  <!-- time axis with delta drift -->
  <line x1="100" y1="600" x2="1100" y2="600" stroke="#2a3340" stroke-width="2"/>
  <path d="M 120 520 Q 400 480 600 400 Q 850 280 1050 220" fill="none" stroke="#c4a574" stroke-width="5"/>
  <text x="120" y="640" fill="#9a9284" font-size="18">open</text>
  <text x="1000" y="640" fill="#9a9284" font-size="18">expiry</text>
  <text x="700" y="360" fill="#6a8fa8" font-size="20">forced Δ flow</text>

</svg>
