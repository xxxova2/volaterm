name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      - name: Test
        # Unit tests only — coverage package optional; missing @vitest/coverage-v8 was
        # failing every push while type-check + lint already passed.
        run: npm test -- --run
      - name: Build
        # Same as Docker/Railway: tsc -b && vite build (black-screen guard = assets built)
        run: npm run build
      - name: Audit (high+ only, non-blocking)
        run: npm audit --audit-level=high || true
